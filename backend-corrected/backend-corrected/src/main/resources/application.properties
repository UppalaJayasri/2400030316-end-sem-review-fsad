spring.application.name=indian-heritage-backend
server.port=${SERVER_PORT:9092}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/indian_heritage?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Vijaya@2006}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:default-dev-secret-key-change-in-production-min-32chars}
app.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:86400000}

app.default-admin.username=${ADMIN_USERNAME:Admin}
app.default-admin.email=${ADMIN_EMAIL:admin@example.com}
app.default-admin.password=${ADMIN_PASSWORD:Admin@1234}
